{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | BORDERLAND</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg);
        }

        
    </style>
</head>
<body>

    <div class="text-center px-4 load-anim" style="max-width: 520px;">

        <!-- Icon -->
        <div class="floating mb-3">
            <i class="fa-solid fa-map-location-dot" style="font-size: 4rem; color: var(--primary); opacity: 0.3;"></i>
        </div>

        <!-- 404 -->
        <p class="error-number mb-0">404</p>

        <!-- Message -->
        <p class="fw-bold mb-2" style="font-size: 1.4rem; color: var(--text-1);">Page Not Found</p>
        <p style="color: var(--text-2); font-size: 0.95rem; line-height: 1.7;">
            The page you're looking for doesn't exist or has been moved. Let's get you back on track.
        </p>

        <!-- Actions -->
        <div class="d-flex gap-3 justify-content-center mt-4 flex-wrap">
            <a href="{% url 'home' %}" class="btn btn-primary">
                <i class="fa-solid fa-house me-2"></i>Go Home
            </a>
            <button onclick="history.back()" class="btn btn-outline-secondary">
                <i class="fa-solid fa-arrow-left me-2"></i>Go Back
            </button>
        </div>

        <!-- Brand -->
        <p style="font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-3); margin-top: 48px;">
            ◆ BORDERLAND
        </p>

    </div>

</body>
</html>
