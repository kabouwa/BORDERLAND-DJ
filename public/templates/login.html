{% extends "base.html" %}
{% load static %}

{% block content %}

<div class="load-anim" style="max-width: 440px; margin: 20px auto 60px;">

    <div class="card-surface">

        <!-- Header -->
        <div class="text-center mb-4">
            <div style="
                width: 60px; height: 60px;
                background: var(--primary-light);
                border-radius: 50%;
                display: flex; align-items: center; justify-content: center;
                margin: 0 auto 16px;
            ">
                <i class="fa-solid fa-user" style="color: var(--primary); font-size: 1.4rem;"></i>
            </div>
            <p class="display-5 fw-bold mb-1" style="color: var(--text-1); font-size: 1.5rem !important;">Welcome back</p>
            <p style="color: var(--text-2); font-size: 0.875rem;">Sign in to your account</p>
        </div>

        <!-- Errors -->

        {% if error %}
            <div class="alert alert-danger mb-3">
                <i class="fa-solid fa-circle-exclamation me-2"></i>{{ error }}
            </div>
        {% endif %}

        <!-- Form -->
        <form method="POST" id="login-form" class="d-flex flex-column gap-3">
            {% csrf_token %}

            <div>
                <label class="form-label">Username</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-user" style="
                        position: absolute; left: 14px; top: 50%;
                        transform: translateY(-50%);
                        color: var(--text-3); font-size: 0.85rem;
                    "></i>
                    <input
                        name="username"
                        type="text"
                        class="form-control"
                        id="username"
                        placeholder="Enter your username"
                        style="padding-left: 38px;"
                        autocomplete="username"
                    >
                </div>
            </div>

            <div>
                <div class="d-flex justify-content-between align-items-center">
                    <label class="form-label mb-0">Password</label>
                </div>
                <div style="position: relative; margin-top: 6px;">
                    <i class="fa-solid fa-lock" style="
                        position: absolute; left: 14px; top: 50%;
                        transform: translateY(-50%);
                        color: var(--text-3); font-size: 0.85rem;
                    "></i>
                    <input
                        name="password"
                        type="password"
                        class="form-control"
                        id="password"
                        placeholder="Enter your password"
                        style="padding-left: 38px; padding-right: 42px;"
                        autocomplete="current-password"
                    >
                    <!-- Toggle password visibility -->
                    <button type="button" id="toggle-password" style="
                        position: absolute; right: 12px; top: 50%;
                        transform: translateY(-50%);
                        background: none; border: none; cursor: pointer;
                        color: var(--text-3); padding: 4px;
                        transition: color var(--transition);
                    " class="toggle-pass" data-target="password">
                        <i class="fa-solid fa-eye" id="eye-icon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-2" style="height: 46px; font-size: 0.95rem;">
                <i class="fa-solid fa-right-to-bracket me-2"></i>Sign In
            </button>
            <!-- SingUp link -->
            <div class="text-center mt-4" style="font-size: 0.875rem; color: var(--text-2);">
                Haven't yet an account?
                <a href="{% url 'signup' %}" style="color: var(--primary); font-weight: 600;">Register</a>
            </div>
        </form>

    </div>
</div>

{% endblock %}
{% block scripts %}
    <script src="{% static 'js/auth.js' %}"></script>
{% endblock scripts %}
